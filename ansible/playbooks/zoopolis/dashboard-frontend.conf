
{% if enable_https %}
acme_client {{ app }}_dashboard https://acme-v02.api.letsencrypt.org/directory;
{% endif %}

upstream {{ app }}-dashboard {
  server {{ docker_network_prefix }}.12:3002;
}

server {
    {% if enable_https %}
    listen       443 ssl;
    http2 on;

    acme {{ app }}_dashboard;
    ssl_certificate      $acme_cert_{{ app }}_dashboard;
    ssl_certificate_key  $acme_cert_key_{{ app }}_dashboard;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 5m;
    ssl_stapling on;
    {% else %}
    listen 80;
    {% endif %}
    server_name  {{ domain_dashboard }};

    gzip on;
    gzip_comp_level 6;
    gzip_types image/svg+xml text/plain text/html text/xml text/css text/javascript application/xml application/xhtml+xml application/rss+xml application/javascript application/x-javascript application/x-font-ttf application/vnd.ms-fontobject font/opentype font/ttf font/eot font/otf;
    gzip_disable "MSIE [1-6]\. ";

    add_header Strict-Transport-Security "max-age=31536000;includeSubDomains" always;#Secure header

    {% if http_auth %}
    auth_basic           "http_auth";
    auth_basic_user_file /etc/angie/passwdfile;
    {% endif %}

    location / {
        proxy_pass http://{{ app }}-dashboard;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    client_max_body_size 50M;

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/angie/html;
    }

}

{% if enable_https %}
server {
    listen 80;

    server_name {{ domain_dashboard }};

    return 301 https://{{ domain_dashboard }}$request_uri;
}
{% endif %}

