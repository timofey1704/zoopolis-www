    networks:
      zoopolis:
        ipv4_address: "{{ docker_network_prefix }}.3"

    depends_on:
      backend:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    volumes:
      - "redis:/data"
    networks:
      zoopolis:
        ipv4_address: "{{ docker_network_prefix }}.10"

  postgres:
    image: postgres:18-alpine
    volumes:
      - "postgres:/var/lib/postgresql/data"
    environment:
      - POSTGRES_USER={{ db_user }}
      - POSTGRES_PASSWORD={{ db_password }}
      - POSTGRES_DB={{ db_name }}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    networks:
      zoopolis:
        ipv4_address: "{{ docker_network_prefix }}.11"

networks:
  zoopolis:
    name: "{{ app }}_network"
    ipam:
      config:
        - subnet: "{{ docker_network_prefix }}.0/24"

volumes:
  media:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "/var/{{ app }}/media"
  static:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "/var/{{ app }}/static"
  redis:
  postgres:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "/var/{{ app }}/postgres"
