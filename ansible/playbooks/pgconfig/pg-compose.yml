services:
  postgres:
    image: postgres:18-alpine
    volumes:
      - "postgres:/var/lib/postgresql/18/docker"
    environment:
      - POSTGRES_USER={{ db_admin_user }}
      - POSTGRES_PASSWORD={{ db_admin_password }}
      - POSTGRES_DB={{ db_admin_name }}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    networks:
      zoopolis:
        ipv4_address: "{{ docker_network_prefix }}.30"

networks:
  zoopolis:
    name: "{{ app }}_network"
    external: true

volumes:
  postgres:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "/var/{{ app }}/postgres"
