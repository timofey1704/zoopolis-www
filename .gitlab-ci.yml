stages:
  - lint
  - lint_dashboard
  # - test

lint_frontend:
  image: node:23-alpine
  stage: lint
  script:
    - cd frontend
    - npm ci
    - npm run lint
  only:
    - main
    - merge_requests

lint_dashboard:
  image: node:23-alpine
  stage: lint_dashboard
  script:
    - cd dashboard-frontend
    - npm ci
    - npm run lint
  only:
    - main
    - merge_requests

